<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeinX AI Assistant</title>
    <script src="https://js.puter.com/v1/puter.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4CAF50;
            --primary-light: #81C784;
            --primary-dark: #388E3C;
            --background: #F5F5F5;
            --card-bg: #FFFFFF;
            --text-primary: #212121;
            --text-secondary: #757575;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            gap: 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
        }

        .logo {
            width: 50px;
            height: 50px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .header-text h1 {
            font-size: 24px;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .chat-container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background-color: var(--primary-light);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background-color: #EDEDED;
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .bot::before {
            content: "HeinX";
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 5px;
            padding: 12px 16px;
            background-color: #EDEDED;
            border-radius: 18px;
            align-self: flex-start;
            margin-bottom: 15px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .input-container {
            display: flex;
            gap: 10px;
            padding: 15px;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        #userInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #E0E0E0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        #userInput:focus {
            border-color: var(--primary-light);
        }

        #sendButton {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sendButton:hover {
            background-color: var(--primary-dark);
        }

        #sendButton i {
            font-size: 18px;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
            text-align: right;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .container {
                height: 95vh;
            }
            
            .msg {
                max-width: 90%;
            }
            
            header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">HX</div>
            <div class="header-text">
                <h1>HeinX AI Assistant</h1>
                <p>Your witty and smart companion</p>
            </div>
        </header>

        <div class="chat-container">
            <div id="chat">
                <div class="msg bot">
                    Hello! I'm HeinX, your AI assistant. How can I help you today?
                    <div class="timestamp" id="initial-timestamp"></div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button id="sendButton" aria-label="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const puter = new Puter();
            const chatBox = document.getElementById("chat");
            const userInput = document.getElementById("userInput");
            const sendButton = document.getElementById("sendButton");
            
            // Set initial timestamp
            document.getElementById("initial-timestamp").textContent = getCurrentTime();

            // Add event listeners
            sendButton.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text) return;

                addMessage("user", text);
                userInput.value = "";
                
                // Show typing indicator
                const typingIndicator = createTypingIndicator();
                chatBox.appendChild(typingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
                
                try {
                    const res = await puter.ai.chat({
                        messages: [
                            { 
                                role: "system", 
                                content: "You are HeinX, a witty and smart AI assistant. " +
                                         "Be helpful, concise, and add personality to your responses. " +
                                         "Use markdown formatting for code blocks, lists, and bold text when appropriate."
                            },
                            { role: "user", content: text }
                        ]
                    });

                    // Remove typing indicator
                    chatBox.removeChild(typingIndicator);
                    
                    addMessage("bot", res.message.content);
                } catch (error) {
                    console.error("Error:", error);
                    chatBox.removeChild(typingIndicator);
                    addMessage("bot", "Sorry, I encountered an error. Please try again.");
                }
            }

            function addMessage(role, text) {
                const msg = document.createElement("div");
                msg.classList.add("msg", role);
                
                if (role === "bot") {
                    msg.innerHTML = text.replace(/\n/g, '<br>');
                } else {
                    msg.textContent = text;
                }
                
                const timestamp = document.createElement("div");
                timestamp.classList.add("timestamp");
                timestamp.textContent = getCurrentTime();
                
                msg.appendChild(timestamp);
                chatBox.appendChild(msg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function createTypingIndicator() {
                const container = document.createElement("div");
                container.className = "typing-indicator";
                
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement("div");
                    dot.className = "typing-dot";
                    container.appendChild(dot);
                }
                
                return container;
            }

            function getCurrentTime() {
                const now = new Date();
                return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
        });
    </script>
</body>
</html>
