<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeinX AI - Professional Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f23;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        
        .app-title {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .new-chat-btn {
            margin: 20px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .conversation-history {
            flex: 1;
            padding: 0 12px;
            overflow-y: auto;
        }
        
        .conversation-item {
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            border: 1px solid transparent;
        }
        
        .conversation-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .conversation-item.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 15, 35, 0.7);
            backdrop-filter: blur(20px);
        }
        
        .chat-title {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .chat-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        .message-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .message {
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
            animation: messageSlideIn 0.4s ease-out;
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            max-width: 70%;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
        }
        
        .ai-message {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            align-self: flex-start;
            max-width: 85%;
            backdrop-filter: blur(10px);
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }
        
        .ai-avatar {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            align-self: flex-start;
        }
        
        .chat-input-container {
            padding: 24px 32px 32px;
            background: rgba(15, 15, 35, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            min-height: 56px;
            max-height: 200px;
        }
        
        .chat-input:focus {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:active {
            transform: translateY(0);
        }
        
        .send-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            align-self: flex-start;
            max-width: 85%;
            backdrop-filter: blur(10px);
        }
        
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0; }
        
        @keyframes typingBounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
        
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-message {
            text-align: center;
            margin: auto;
            padding: 40px 20px;
            max-width: 600px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .welcome-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                overflow: hidden;
            }
            
            .chat-messages, .chat-input-container {
                padding-left: 20px;
                padding-right: 20px;
            }
            
            .message {
                max-width: 90%;
            }
            
            .user-message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">H</div>
                <div class="app-title">HeinX AI</div>
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">
                + New Chat
            </button>
            <div class="conversation-history" id="conversation-history">
                <div class="conversation-item active">Current Conversation</div>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-title">HeinX AI Assistant</div>
                <div class="chat-subtitle">Powered by advanced AI technology</div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-title">Welcome to HeinX AI</div>
                    <div class="welcome-subtitle">
                        I'm here to help you with questions, creative tasks, analysis, and more. 
                        How can I assist you today?
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <div class="input-wrapper">
                    <textarea class="chat-input" id="user-input" placeholder="Type your message here..." rows="1"></textarea>
                    <button class="send-button" id="send-button">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        // DOM elements
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const conversationHistory = document.getElementById('conversation-history');
        
        let conversations = [];
        let currentConversation = 0;
        let messageCount = 0;
        
        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
        
        // Function to add a message to the chat
        function addMessage(text, isUser) {
            // Remove welcome message if it exists
            const welcomeMessage = document.querySelector('.welcome-message');
            if (welcomeMessage) {
                welcomeMessage.remove();
            }
            
            const messageGroup = document.createElement('div');
            messageGroup.classList.add('message-group');
            
            // Add avatar
            const avatar = document.createElement('div');
            avatar.classList.add('message-avatar');
            avatar.classList.add(isUser ? 'user-avatar' : 'ai-avatar');
            avatar.textContent = isUser ? 'U' : 'AI';
            messageGroup.appendChild(avatar);
            
            // Add message
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
            messageDiv.textContent = text;
            messageGroup.appendChild(messageDiv);
            
            chatMessages.appendChild(messageGroup);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            messageCount++;
            
            // Update conversation history
            updateConversationHistory(text, isUser);
        }
        
        // Function to show typing indicator
        function showTypingIndicator() {
            const typingGroup = document.createElement('div');
            typingGroup.classList.add('message-group');
            typingGroup.id = 'typing-indicator-group';
            
            const avatar = document.createElement('div');
            avatar.classList.add('message-avatar', 'ai-avatar');
            avatar.textContent = 'AI';
            
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('typing-indicator');
            typingDiv.innerHTML = `
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span style="margin-left: 8px; font-size: 14px; color: rgba(255,255,255,0.6);">Thinking...</span>
            `;
            
            typingGroup.appendChild(avatar);
            typingGroup.appendChild(typingDiv);
            chatMessages.appendChild(typingGroup);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Function to remove typing indicator
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator-group');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // Function to update conversation history
        function updateConversationHistory(text, isUser) {
            if (isUser && messageCount <= 2) {
                const firstWords = text.split(' ').slice(0, 4).join(' ');
                const truncated = text.length > 30 ? firstWords + '...' : firstWords;
                
                const activeItem = document.querySelector('.conversation-item.active');
                if (activeItem && activeItem.textContent === 'Current Conversation') {
                    activeItem.textContent = truncated;
                }
            }
        }
        
        // Function to start new chat
        function startNewChat() {
            // Save current conversation
            const currentMessages = chatMessages.innerHTML;
            conversations.push(currentMessages);
            
            // Clear chat
            chatMessages.innerHTML = `
                <div class="welcome-message">
                    <div class="welcome-title">Welcome to HeinX AI</div>
                    <div class="welcome-subtitle">
                        I'm here to help you with questions, creative tasks, analysis, and more. 
                        How can I assist you today?
                    </div>
                </div>
            `;
            
            // Add new conversation to history
            const newItem = document.createElement('div');
            newItem.classList.add('conversation-item', 'active');
            newItem.textContent = 'Current Conversation';
            
            // Remove active from other items
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            
            conversationHistory.insertBefore(newItem, conversationHistory.firstChild);
            messageCount = 0;
        }
        
        // Send message function
        function sendMessage() {
            const message = userInput.value.trim();
            if (message) {
                addMessage(message, true);
                userInput.value = '';
                userInput.style.height = 'auto';
                
                showTypingIndicator();
                
                // Send to Puter AI
                puter.ai.chat(message).then(response => {
                    removeTypingIndicator();
                    addMessage(response, false);
                }).catch(error => {
                    removeTypingIndicator();
                    addMessage("Sorry, I encountered an error. Please try again.", false);
                    console.error(error);
                });
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Focus input on page load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
